<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bakımda | Cep Portföy</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.4);
            --bg: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Modern Robot Animasyonu ── */
        .robot-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 2rem;
            z-index: 10;
        }

        .robot-head {
            width: 120px;
            height: 90px;
            background: linear-gradient(145deg, #ffffff, #e2e8f0);
            border-radius: 40px 40px 30px 30px;
            position: absolute;
            top: 40px;
            left: 30px;
            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.3),
                inset 0 4px 10px rgba(255, 255, 255, 0.8),
                inset 0 -4px 10px rgba(0, 0, 0, 0.1);
            animation: float 4s ease-in-out infinite;
            z-index: 2;
        }

        .robot-face {
            width: 90px;
            height: 50px;
            background: #0f172a;
            border-radius: 20px;
            position: absolute;
            top: 20px;
            left: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Yüzdeki parlamalar çizgisi */
        .robot-face::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(45deg);
            animation: scan 3s linear infinite;
        }

        .eye {
            width: 20px;
            height: 12px;
            background: var(--accent);
            border-radius: 6px;
            box-shadow: 0 0 15px var(--accent);
            animation: blink 4s infinite, glow 2s ease-in-out infinite alternate;
        }

        .robot-ear {
            width: 12px;
            height: 30px;
            background: #cbd5e1;
            position: absolute;
            top: 50px;
            border-radius: 6px;
            animation: float 4s ease-in-out infinite;
            z-index: 1;
        }

        .ear-left {
            left: 18px;
        }

        .ear-right {
            right: 18px;
        }

        .robot-antenna {
            width: 4px;
            height: 30px;
            background: #cbd5e1;
            position: absolute;
            top: 10px;
            left: 88px;
            border-radius: 2px;
            animation: float 4s ease-in-out infinite;
        }

        .antenna-ball {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 83px;
            box-shadow: 0 0 10px var(--accent);
            animation: float 4s ease-in-out infinite, glow 1.5s ease-in-out infinite alternate;
        }

        .robot-hand {
            width: 35px;
            height: 35px;
            background: linear-gradient(145deg, #ffffff, #cbd5e1);
            border-radius: 50%;
            position: absolute;
            top: 100px;
            right: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: wave 2.5s ease-in-out infinite cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom left;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .robot-hand::after {
            content: '';
            width: 15px;
            height: 15px;
            background: #94a3b8;
            border-radius: 50%;
        }

        /* ── Metin İçerik ── */
        .content {
            text-align: center;
            max-width: 600px;
            padding: 0 2rem;
            z-index: 10;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--accent);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #94a3b8;
            font-weight: 400;
            margin-bottom: 2.5rem;
        }

        .loader-container {
            width: 100%;
            max-width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 10px;
            animation: loadMsg 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-text {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            animation: pulseText 1.5s infinite alternate;
        }

        /* ── Arkaplan Efektleri ── */
        .geometric-shape {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            z-index: 1;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 600px;
            height: 600px;
            bottom: -200px;
            right: -100px;
            border-color: rgba(212, 175, 55, 0.03);
        }

        /* ── Animasyonlar ── */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes wave {

            0%,
            100% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(-25deg);
            }

            40% {
                transform: rotate(15deg);
            }

            60% {
                transform: rotate(-15deg);
            }

            80% {
                transform: rotate(5deg);
            }
        }

        @keyframes blink {

            0%,
            96%,
            98% {
                transform: scaleY(1);
            }

            97% {
                transform: scaleY(0.1);
            }
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 5px var(--accent);
                opacity: 0.8;
            }

            to {
                box-shadow: 0 0 20px var(--accent-glow);
                opacity: 1;
            }
        }

        @keyframes scan {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(200%) rotate(45deg);
            }
        }

        @keyframes loadMsg {
            0% {
                left: -30%;
            }

            100% {
                left: 100%;
            }
        }

        @keyframes pulseText {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }

            .robot-container {
                transform: scale(0.85);
                margin-bottom: 1rem;
            }
        }

        /* ── Sayaç (Countdown) ── */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 2rem;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            min-width: 80px;
            backdrop-filter: blur(5px);
        }

        .countdown-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 5px;
        }

        .countdown-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <!-- Arkaplan Dekorasyon -->
    <div class="geometric-shape shape-1"></div>
    <div class="geometric-shape shape-2"></div>

    <!-- Robot -->
    <div class="robot-container">
        <div class="robot-antenna"></div>
        <div class="antenna-ball"></div>
        <div class="robot-ear ear-left"></div>
        <div class="robot-ear ear-right"></div>
        <div class="robot-head">
            <div class="robot-face">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="robot-hand"></div>
    </div>

    <!-- İçerik -->
    <div class="content">
        <div class="badge">Sistem Güncellemesi</div>
        <h1>Mükemmelliği İnşa Ediyoruz</h1>
        <p>Sizlere daha hızlı, daha güvenli ve kusursuz bir deneyim sunabilmek için altyapımızda planlı bir iyileştirme
            gerçekleştiriyoruz. Çok kısa bir süre sonra tekrar yayındayız.</p>

        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
        <div class="loader-text">Sistem Optimize Ediliyor...</div>

        <!-- Sayaç Alanı -->
        <div class="countdown-container">
            <div class="countdown-item">
                <div class="countdown-value" id="hours">00</div>
                <div class="countdown-label">Saat</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="minutes">00</div>
                <div class="countdown-label">Dakika</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="seconds">00</div>
                <div class="countdown-label">Saniye</div>
            </div>
        </div>
    </div>

    <script>
        // Sunucudan (FastAPI) gelen bitiş zamanı (milisaniye cinsinden)
        let endTime = parseInt("__MAINTENANCE_END_TIME__");

        // Eğer sunucu dışından (örneğin lokal dosya olarak) açılırsa yedek olarak 10dk ver.
        if (isNaN(endTime)) {
            endTime = new Date().getTime() + (10 * 60 * 1000);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = endTime - now;

            if (distance < 0) {
                // Süre bittiyse sıfırda tut
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
                document.querySelector(".loader-text").innerHTML = "Sistem Çevrimiçi Oluyor...";
                return;
            }

            // Saat, dakika ve saniyeyi hesapla
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Değerleri HTML'e yazdır (Eğer 10'dan küçükse başına 0 ekle)
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
        }

        // İlk güncellemeyi yap ve her saniye tekrarla
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>

</html>
