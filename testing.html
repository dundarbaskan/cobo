<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bakımda</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #fff;
            padding: 40px 60px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #d9534f;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1em;
            color: #555;
            line-height: 1.6;
        }

        .icon {
            font-size: 50px;
            color: #f0ad4e;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>Sistem Bakımda</h1>
        <p>Şu anda sistemimizde test ve iyileştirme çalışmaları yapıyoruz.</p>
        <p>Lütfen daha sonra tekrar ziyaret ediniz. Sabrınız için teşekkür ederiz.</p>
    </div>
</body>

</html>
